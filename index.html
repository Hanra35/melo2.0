<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Melo</title>
  <style>
    :root{--bg:#0D1421;--card:#182030;--card2:#1F2A3E;--text:#E6EAF4;--sub:#7A8799;--border:rgba(255,255,255,.07);--acc:#4DCFBF;--acc-dim:rgba(77,207,191,.14);--orange:#FF8A65;--nav-bg:rgba(13,20,33,.92);--mini-bg:rgba(18,28,46,.96);--sh:0 8px 32px rgba(0,0,0,.35);--sh2:0 2px 12px rgba(0,0,0,.2);--nav-h:60px;--mini-h:66px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
    /* FIX 2: scroll bottom = nav + safe + mini-player + gap */
    --scroll-pb:calc(var(--nav-h) + var(--safe-b) + var(--mini-h) + 20px);}
    body.light{--bg:#F2F5FA;--card:#FFFFFF;--card2:#EBF0F7;--text:#1A2340;--sub:#8A96AA;--border:rgba(0,0,0,.07);--nav-bg:rgba(242,245,250,.93);--mini-bg:rgba(20,30,55,.97);--sh:0 8px 32px rgba(0,0,0,.1);--sh2:0 2px 12px rgba(0,0,0,.06);}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{display:none;}
    button{font-family:inherit;cursor:pointer;}

    .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .36s cubic-bezier(.4,0,.2,1),opacity .36s;will-change:transform;}
    .screen.hidden{transform:translateX(100%);pointer-events:none;}
    .screen.slide-left{transform:translateX(-28%);opacity:.45;pointer-events:none;}

    /* HOME */
    #s-home{padding-top:calc(var(--safe-t)+10px);}
    .home-head{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;}
    .home-title{font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--text);}
    .head-actions{display:flex;align-items:center;}
    .head-btn{width:36px;height:36px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;border:none;box-shadow:var(--sh2);margin-left:8px;}
    .home-scroll{flex:1;overflow-y:auto;padding-bottom:var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .home-tabs{display:flex;padding:10px 20px 4px;}
    .tab-btn{padding:7px 16px;border-radius:20px;border:none;font-size:13px;font-weight:600;background:transparent;color:var(--sub);transition:all .2s;margin-right:4px;}
    .tab-btn.active{background:var(--acc);color:#fff;}
    .tab-section{display:none;}.tab-section.active{display:block;}

    /* SEARCH */
    .search-wrap{padding:8px 18px 4px;position:relative;display:flex;align-items:center;}
    .search-wrap svg{position:absolute;left:30px;pointer-events:none;}
    .search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 14px 10px 36px;color:var(--text);font-size:14px;outline:none;font-family:inherit;}
    .search-input::placeholder{color:var(--sub);}
    .search-input:focus{border-color:var(--acc);}

    /* HERO */
    .hero{margin:6px 18px 0;border-radius:22px;overflow:hidden;height:162px;position:relative;cursor:pointer;}
    .hero-inner{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;}
    .hero-tag{font-size:10px;font-weight:700;color:rgba(255,255,255,.72);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
    .hero-name{font-size:20px;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:72%;}
    .hero-artist{font-size:12px;color:rgba(255,255,255,.68);margin-top:2px;}
    .hero-play{position:absolute;right:16px;bottom:16px;width:44px;height:44px;border-radius:50%;background:var(--orange);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(255,138,101,.45);}
    .sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;}
    .sec-title{font-size:17px;font-weight:700;}
    .sec-link{font-size:13px;color:var(--acc);font-weight:500;}
    .cards-row{display:flex;padding:0 18px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
    .pl-card{flex-shrink:0;width:122px;cursor:pointer;margin-right:13px;}
    .pl-card:last-child{margin-right:0;}
    .pl-card-art{width:122px;height:122px;border-radius:16px;overflow:hidden;margin-bottom:8px;box-shadow:var(--sh);position:relative;}
    .pl-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;height:100%;}
    .pl-card-grid div{width:100%;height:100%;}
    .pl-card-solo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
    .pl-card-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .pl-card-sub{font-size:11px;color:var(--sub);margin-top:2px;}
    .pl-new-card{flex-shrink:0;width:122px;cursor:pointer;}
    .pl-new-art{width:122px;height:122px;border-radius:16px;background:var(--card2);border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
    .song-list{padding:0 14px;}
    .song-row{display:flex;align-items:center;padding:9px 8px;border-radius:14px;cursor:pointer;transition:background .12s;}
    .song-row:active{background:var(--card2);}
    .song-row.active .song-name{color:var(--acc);font-weight:600;}
    .song-art{width:50px;height:50px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;margin-right:12px;}
    .song-cached{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:#34c759;border:1.5px solid var(--card);}
    .song-info{flex:1;min-width:0;}
    .song-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .song-artist{font-size:12px;color:var(--sub);margin-top:2px;}
    .song-menu{background:transparent;border:none;padding:8px;color:var(--sub);display:flex;align-items:center;}
    @keyframes b1{0%{height:4px}100%{height:16px}} @keyframes b2{0%{height:12px}100%{height:5px}} @keyframes b3{0%{height:8px}100%{height:14px}}
    .eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
    .eq span{width:3px;border-radius:2px;background:var(--acc);}
    .eq.on span:nth-child(1){animation:b1 .7s ease-in-out infinite alternate;}
    .eq.on span:nth-child(2){animation:b2 .7s ease-in-out infinite alternate .18s;}
    .eq.on span:nth-child(3){animation:b3 .7s ease-in-out infinite alternate .36s;}

    /* ALBUMS */
    .albums-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 16px 10px;}
    .album-card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:var(--sh2);position:relative;}
    .album-card:active{transform:scale(.97);}
    .album-art{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
    .album-art-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;height:100%;}
    .album-art-grid div{width:100%;height:100%;}
    .album-info{padding:10px 12px;}
    .album-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .album-sub{font-size:11px;color:var(--sub);margin-top:2px;}
    .album-menu-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.45);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#fff;}
    .album-new{background:var(--card2);border-radius:16px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px 12px;cursor:pointer;min-height:160px;}
    .album-new p{font-size:13px;color:var(--sub);font-weight:500;}

    /* ARTISTS */
    #s-artists{padding-top:calc(var(--safe-t)+10px);}
    .artists-scroll{flex:1;overflow-y:auto;padding:10px 14px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .artist-card{background:var(--card);border-radius:18px;padding:14px;display:flex;align-items:center;margin-bottom:10px;box-shadow:var(--sh2);}
    .artist-avatar{width:60px;height:60px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:14px;font-size:22px;font-weight:700;color:#fff;}
    .artist-info{flex:1;min-width:0;}
    .artist-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .artist-sub{font-size:12px;color:var(--sub);margin-top:2px;}
    .artist-btn{background:transparent;border:none;padding:6px;color:var(--sub);display:flex;align-items:center;}

    /* ALBUM DETAIL */
    #s-albumdetail{background:var(--bg);padding-top:calc(var(--safe-t)+14px);}
    .albd-head{display:flex;align-items:center;padding:0 16px 14px;}
    .albd-scroll{flex:1;overflow-y:auto;padding:0 14px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .albd-hero{padding:0 14px 16px;display:flex;align-items:center;}
    .albd-art{width:88px;height:88px;border-radius:16px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:2px;overflow:hidden;box-shadow:var(--sh);margin-right:16px;}
    .albd-art div{width:100%;height:100%;}
    .albd-art.solo{display:flex;align-items:center;justify-content:center;background:var(--card2);}
    .albd-info{flex:1;}
    .albd-name{font-size:20px;font-weight:800;color:var(--text);}
    .albd-sub{font-size:12px;color:var(--sub);margin-top:3px;}
    .albd-play-btn{margin-top:10px;background:var(--acc);border:none;border-radius:12px;padding:9px 20px;color:#fff;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}

    /* ARTIST DETAIL */
    #s-artistdetail{background:var(--bg);padding-top:calc(var(--safe-t)+14px);}
    .artd-head{display:flex;align-items:center;padding:0 16px 14px;}
    .artd-scroll{flex:1;overflow-y:auto;padding:0 14px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .artd-hero{padding:0 14px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;}
    .artd-avatar{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;color:#fff;box-shadow:var(--sh);margin-bottom:12px;}
    .artd-name{font-size:22px;font-weight:800;color:var(--text);}
    .artd-sub{font-size:13px;color:var(--sub);margin-top:4px;}
    .artd-section{font-size:16px;font-weight:700;padding:14px 0 8px;color:var(--text);}

    /* FIX 3: Mini-player hidden in player screen */
    /* Mini Player positionné juste au-dessus de la Nav Bar */
.mini-player {
  position: fixed;
  /* On le place à la hauteur de la nav + la zone safe de l'iPhone */
  bottom: calc(var(--nav-h) + var(--safe-b)); 
  left: 10px;
  right: 10px;
  height: var(--mini-h);
  background: var(--mini-bg);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 12px;
  display: none; /* Affiché uniquement quand une musique joue */
  align-items: center;
  padding: 0 12px;
  box-shadow: var(--sh);
  border: 1px solid var(--border);
  z-index: 999;
}
    #mini-player.show{transform:translateY(0);opacity:1;}
    #mini-player.hidden-in-player{transform:translateY(200px)!important;opacity:0!important;pointer-events:none!important;}
    .mp-art{width:44px;height:44px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:10px;}
    .mp-info{flex:1;min-width:0;}
    .mp-name{font-size:14px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .mp-artist{font-size:11px;color:rgba(255,255,255,.48);margin-top:1px;}
    .mp-btn{background:transparent;border:none;padding:8px;color:rgba(255,255,255,.65);display:flex;align-items:center;}
    .mp-play{background:var(--acc);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .mp-play:active{transform:scale(.9);}
    .mp-prog{position:absolute;bottom:0;left:10px;right:10px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .mp-prog-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .1s linear;}

    /* BOTTOM NAV */
    #bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h)+var(--safe-b));background:var(--nav-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:80;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 4px;background:transparent;border:none;}
    .nav-item svg{transition:transform .15s;color:var(--sub);}
    .nav-item.active svg{transform:scale(1.08);color:var(--acc);}
    .nav-label{font-size:10px;font-weight:500;color:var(--sub);}
    .nav-item.active .nav-label{color:var(--acc);}

    /* PLAYER */
    #s-player{background:var(--bg);padding-top:calc(var(--safe-t)+14px);}
    .player-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
    .player-head-title{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:1.2px;text-transform:uppercase;}
    .player-close{background:var(--card);border:none;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
    .player-scroll{flex:1;overflow-y:auto;padding-bottom:20px;-webkit-overflow-scrolling:touch;}
    .player-art-wrap{padding:22px 30px 16px;display:flex;justify-content:center;}
    .player-art{width:100%;max-width:300px;aspect-ratio:1/1;border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 24px 64px rgba(0,0,0,.32);overflow:hidden;}
    .player-art.pulse{animation:artpulse .5s ease;}
    @keyframes artpulse{0%{transform:scale(1)}50%{transform:scale(1.025)}100%{transform:scale(1)}}
    .player-meta{padding:0 26px;display:flex;align-items:flex-start;justify-content:space-between;}
    .player-title{font-size:22px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:calc(100% - 48px);color:var(--text);}
    .player-artist{font-size:14px;color:var(--sub);margin-top:4px;}
    .like-btn{background:transparent;border:none;padding:4px;flex-shrink:0;}
    .player-seek{padding:18px 26px 6px;}
    .seek-track{height:3px;background:var(--card2);border-radius:3px;cursor:pointer;position:relative;overflow:hidden;}
    .seek-fill{position:absolute;left:0;top:0;height:100%;background:var(--acc);border-radius:3px;transition:width .1s linear;pointer-events:none;}
    .seek-times{display:flex;justify-content:space-between;margin-top:6px;}
    .seek-time{font-size:11px;color:var(--sub);font-family:monospace;}
    /* FIX 4: player controls with queue button */
    .player-controls{display:flex;align-items:center;justify-content:space-around;padding:14px 20px;}
    .pc-btn{background:transparent;border:none;display:flex;align-items:center;justify-content:center;color:var(--sub);padding:5px;}
    .pc-btn.on{color:var(--acc);}
    .pc-btn:active{transform:scale(.9);}
    .pc-play{background:var(--orange);border:none;border-radius:50%;width:62px;height:62px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(255,138,101,.45);}
    .pc-play:active{transform:scale(.93);}
    .player-vol{display:flex;align-items:center;padding:4px 26px 14px;}
    .player-vol svg{color:var(--sub);flex-shrink:0;}
    .vol-sp{width:10px;}
    input[type=range]{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:var(--card2);outline:none;flex:1;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);}

    /* PLAYLISTS */
    #s-playlists{padding-top:calc(var(--safe-t)+10px);}
    .pl-screen-head{padding:8px 20px 4px;display:flex;align-items:center;justify-content:space-between;}
    .pl-screen-scroll{flex:1;overflow-y:auto;padding:10px 14px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .pl-big-card{background:var(--card);border-radius:18px;padding:14px;display:flex;align-items:center;margin-bottom:10px;box-shadow:var(--sh2);}
    .pl-big-card:active{transform:scale(.98);}
    .pl-big-art{width:58px;height:58px;border-radius:12px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:2px;overflow:hidden;margin-right:14px;}
    .pl-big-art div{width:100%;height:100%;}
    .pl-big-art.solo{display:flex;align-items:center;justify-content:center;background:var(--card2);}
    .pl-big-info{flex:1;min-width:0;}
    .pl-big-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .pl-big-sub{font-size:12px;color:var(--sub);margin-top:2px;}
    .pl-big-actions{display:flex;}
    .pl-big-btn{background:transparent;border:none;padding:6px;color:var(--sub);display:flex;align-items:center;}

    /* IMPORT */
    #s-import{padding-top:calc(var(--safe-t)+10px);}
    .imp-scroll{flex:1;overflow-y:auto;padding:10px 16px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .dropzone{background:var(--card);border-radius:20px;padding:34px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;border:2px dashed var(--border);}
    .dropzone.drag{border-color:var(--acc);background:var(--acc-dim);}
    .dz-ico{width:54px;height:54px;border-radius:14px;background:var(--acc-dim);display:flex;align-items:center;justify-content:center;}
    .dz-title{font-size:15px;font-weight:700;text-align:center;color:var(--text);}
    .dz-sub{font-size:13px;color:var(--sub);text-align:center;}
    .uplist{margin-top:14px;}
    .upitem{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh2);}
    .uphd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .upname{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:8px;color:var(--text);}
    .uppct{font-size:12px;color:var(--acc);font-weight:600;}
    .upbg{height:3px;background:var(--card2);border-radius:3px;overflow:hidden;}
    .upfill{height:100%;background:var(--acc);border-radius:3px;transition:width .1s;}
    .updone{color:#34c759;font-size:12px;font-weight:600;}
    .uperr{color:#ff4d4d;font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* PLAYLIST DETAIL */
    #s-pldetail{background:var(--bg);padding-top:calc(var(--safe-t)+14px);}
    .pld-head{display:flex;align-items:center;padding:0 16px 14px;}
    .back-btn{background:var(--card);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:10px;}
    .pld-scroll{flex:1;overflow-y:auto;padding:0 14px var(--scroll-pb);-webkit-overflow-scrolling:touch;}
    .pld-hero{padding:0 14px 16px;display:flex;align-items:center;}
    .pld-art{width:88px;height:88px;border-radius:16px;flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;gap:2px;overflow:hidden;box-shadow:var(--sh);margin-right:16px;}
    .pld-art div{width:100%;height:100%;}
    .pld-art.solo{display:flex;align-items:center;justify-content:center;background:var(--card2);}
    .pld-info{flex:1;}
    .pld-name{font-size:20px;font-weight:800;color:var(--text);}
    .pld-count{font-size:12px;color:var(--sub);margin-top:3px;}
    .pld-play-btn{margin-top:10px;background:var(--acc);border:none;border-radius:12px;padding:9px 20px;color:#fff;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:5px;}

    /* TRACK PICKER (multi-select) */
    .pick-list{max-height:58vh;overflow-y:auto;}
    .pick-item{display:flex;align-items:center;padding:11px 18px;cursor:pointer;transition:background .1s;}
    .pick-item:active{background:var(--card2);}
    .pick-art{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:12px;}
    .pick-info{flex:1;min-width:0;}
    .pick-name{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
    .pick-artist{font-size:12px;color:var(--sub);}
    .pick-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .pick-check.checked{background:var(--acc);border-color:var(--acc);}

    /* FIX 4: QUEUE (À suivre) */

    .sheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:500px;padding:10px 0 calc(16px + var(--safe-b));}

    .sheet-item.red{color:#ff4d4d;}
    .dialog-title{font-size:17px;font-weight:700;margin-bottom:4px;color:var(--text);}
    .dialog-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:14px;font-family:inherit;}

    .d-btn.confirm{background:var(--acc);color:#fff;}

    #loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:300;}
    .spin{width:28px;height:28px;border:2.5px solid var(--card2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #notif{position:fixed;bottom:calc(var(--nav-h)+var(--safe-b)+var(--mini-h)+16px);left:50%;transform:translateX(-50%);background:var(--card);border-radius:12px;padding:9px 18px;font-size:13px;font-weight:500;color:var(--text);opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:250;box-shadow:var(--sh);border:1px solid var(--border);}

</head>

// --- FONCTION POUR VIDER LA MÉMOIRE (À lier à un bouton si tu veux) ---
async function clearMeloCache() {
  await caches.delete('melo-cache-v1');
  alert("Mémoire musique vidée !");
}
const API='./api/api', BUCKET='melo-music-2026';
var tracks=[],playlists=[],albums=[],artists=[],liked=new Set();
var cur=null,isPlaying=false,isShuffle=false,repeatMode=0,volume=0.8;

/* multi-select picker */
var pickerSelected=[],pickerTarget=null,pickerType=null;
/* FIX 4: queue drag state */
var qDragItems=[];
const blobCache=new Map(),cacheOrder=[];
const CACHE_MAX=10;
const aud=document.getElementById('aud');
aud.volume=volume;

const fmt=t=>(!t||isNaN(t))?'0:00':`${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
const hue=s=>{let h=0;for(let c of s)h=((h<<5)-h+c.charCodeAt(0))|0;return Math.abs(h)%360;};
const abg=h=>`hsl(${h},55%,62%)`;
const abg2=h=>`hsl(${h},45%,50%)`;
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const genId=()=>Date.now()+'_'+Math.random().toString(36).slice(2);
const noteIco=(sz,col)=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="${col}"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
function notify(m,ms){ms=ms||2400;var el=document.getElementById('notif');el.textContent=m;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);}

/* THEME */
var isDark=true;
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);var i=document.getElementById('theme-ico');if(isDark){i.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}else{i.setAttribute('stroke','var(--sub)');i.setAttribute('fill','none');i.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}}

/* HOME TABS */
function switchHomeTab(tab){activeHomeTab=tab;['overview','tracks','albums'].forEach(t=>{document.getElementById('tab-'+(t==='overview'?'overview':t==='tracks'?'tracks':'albums')).classList.toggle('active',t===tab);document.getElementById('ts-'+t).classList.toggle('active',t===tab);});if(tab==='tracks') renderTracks();if(tab==='albums') renderAlbumsGrid();}

/* SCREENS */
const SCREENS={home:'s-home',playlists:'s-playlists',artists:'s-artists',import:'s-import',pldetail:'s-pldetail',albumdetail:'s-albumdetail',artistdetail:'s-artistdetail',player:'s-player'};
var activeScreen='home';
function showScreen(name,fromLeft){fromLeft=fromLeft||false;var prev=document.getElementById(SCREENS[activeScreen]);var next=document.getElementById(SCREENS[name]);if(!next||prev===next) return;prev.classList.remove('slide-left');if(!fromLeft) prev.classList.add('slide-left');else prev.classList.add('hidden');next.classList.remove('hidden','slide-left');activeScreen=name;}

/* FIX 3: hide mini-player when entering player screen, show on close */
function openPlayer(){
  prevNav=activeScreen;
  showScreen('player');
  document.getElementById('mini-player').classList.add('hidden-in-player');
}
function closePlayer(){
  var s=document.getElementById('s-player');s.classList.add('hidden');s.classList.remove('slide-left');
  var target=prevNav||'home';var prev=document.getElementById(SCREENS[target]);
  if(prev){prev.classList.remove('hidden','slide-left');}
  activeScreen=target;
  /* restore mini-player only if a track is playing */
  if(cur!==null) document.getElementById('mini-player').classList.remove('hidden-in-player');
}

function gotoNav(name){
  /* FIX: Si on quitte le player via la nav, restaurer le mini-player */
  if(cur!==null) document.getElementById('mini-player').classList.remove('hidden-in-player');
  Object.keys(SCREENS).forEach(n=>{var el=document.getElementById(SCREENS[n]);if(!el) return;if(n===name){el.classList.remove('hidden','slide-left');}else{el.classList.remove('slide-left');el.classList.add('hidden');}});activeScreen=name;['home','playlists','artists','import'].forEach(n=>{var item=document.getElementById('nav-'+n);if(!item) return;item.classList.toggle('active',n===name);});if(name==='home') renderHome();if(name==='playlists') renderPlScreen();if(name==='artists') renderArtists();}

/* CACHE */
function isCached(id){return blobCache.has(id);}
function addToCache(id,url){if(blobCache.has(id)) return;if(cacheOrder.length>=CACHE_MAX){var old=cacheOrder.shift();var u=blobCache.get(old);if(u)URL.revokeObjectURL(u);blobCache.delete(old);}blobCache.set(id,url);cacheOrder.push(id);}
function uncacheTrack(id){var u=blobCache.get(id);if(u)URL.revokeObjectURL(u);blobCache.delete(id);var i=cacheOrder.indexOf(id);if(i>-1)cacheOrder.splice(i,1);renderHome();}
function scheduleCacheDl(t){if(isCached(t.id)) return;setTimeout(async()=>{if(isCached(t.id)) return;try{document.getElementById('cache-bar').classList.add('show');var r=await fetch(rawUrl(t.key));if(!r.ok) return;var blob=await r.blob();addToCache(t.id,URL.createObjectURL(blob));document.getElementById('cache-bar').classList.remove('show');renderHome();}catch(_){document.getElementById('cache-bar').classList.remove('show');}},3000);}
var rawUrl=key=>dlUrl+'/file/'+BUCKET+'/'+encodeURIComponent(key)+'?Authorization='+encodeURIComponent(dlToken);

async function saveMeta(){try{await fetch(API+'?action=save-meta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tracks,playlists,albums,artists})});}catch(e){console.error(e);}}

/* SONG ROW */
function songRowHtml(t,i,clickFn,menuFn,removeFn){var h=t.hue||hue(t.name),isCur=i===cur,cached=isCached(t.id);var art=isCur&&isPlaying?'<div class="eq on"><span style="height:6px"></span><span style="height:13px"></span><span style="height:9px"></span></div>':noteIco(20,'rgba(255,255,255,.8)');var btn=removeFn?`<button class="song-menu" onclick="${removeFn}"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>`:`<button class="song-menu" onclick="${menuFn}"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>`;return `<div class="song-row${isCur?' active':''}" onclick="${clickFn}"><div class="song-art" style="background:${abg(h)}">${art}${cached?'<div class="song-cached"></div>':''}</div><div class="song-info"><p class="song-name">${esc(t.name)}</p><p class="song-artist">${esc(t.artist)}</p></div>${btn}</div>`;}

/* ════════════════════════════════════════
   FIX 1: TRACK PICKER — always gets FRESH existingIds from the live object
   ════════════════════════════════════════ */
function openTrackPicker(type, targetId){
  pickerTarget=targetId; pickerType=type; pickerSelected=[];
  /* Always get fresh data — this is the key fix for bug 1 */
  var existingIds=[];
  if(type==='album'){var o=albums.find(a=>a.id===targetId);if(o) existingIds=o.trackIds.slice();}
  else if(type==='artist'){var o=artists.find(a=>a.id===targetId);if(o) existingIds=o.trackIds.slice();}
  else if(type==='playlist'){var o=playlists.find(p=>p.id===targetId);if(o) existingIds=o.trackIds.slice();}

  var available=tracks.filter(t=>!existingIds.includes(t.id));
  if(!available.length){notify('Tous vos titres sont déjà ajoutés');return;}
  var items=available.map(t=>{var h=t.hue||hue(t.name);return `<div class="pick-item" id="pi-${t.id}" onclick="togglePick('${t.id}')"><div class="pick-art" style="background:${abg(h)}">${noteIco(18,'rgba(255,255,255,.8)')}</div><div class="pick-info"><p class="pick-name">${esc(t.name)}</p><p class="pick-artist">${esc(t.artist)}</p></div><div class="pick-check" id="pc-${t.id}"></div></div>`;}).join('');
  showModal(`<div class="sheet"><div class="sheet-handle"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:0 18px 4px"><p style="font-size:16px;font-weight:700;color:var(--text)">Sélectionner des titres</p><p style="font-size:12px;color:var(--sub)" id="pick-count">0 sélectionné</p></div><div class="pick-list">${items}</div><button class="pick-confirm" onclick="confirmPick()">Ajouter la sélection</button></div>`);
}

function togglePick(id){var idx=pickerSelected.indexOf(id);if(idx>-1) pickerSelected.splice(idx,1);else pickerSelected.push(id);var el=document.getElementById('pc-'+id);if(el){el.classList.toggle('checked',pickerSelected.includes(id));el.innerHTML=pickerSelected.includes(id)?'<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>':'';}var cnt=document.getElementById('pick-count');if(cnt) cnt.textContent=pickerSelected.length+' sélectionné'+(pickerSelected.length>1?'s':'');}

function confirmPick(){
  if(!pickerSelected.length){notify('Aucun titre sélectionné');return;}
  if(pickerType==='album'){var alb=albums.find(a=>a.id===pickerTarget);if(alb){pickerSelected.forEach(id=>{if(!alb.trackIds.includes(id)) alb.trackIds.push(id);});saveMeta();renderAlbumDetail();notify(pickerSelected.length+' titre(s) ajouté(s) ✓');}}
  else if(pickerType==='artist'){var ar=artists.find(a=>a.id===pickerTarget);if(ar){pickerSelected.forEach(id=>{if(!ar.trackIds.includes(id)) ar.trackIds.push(id);var t=tracks.find(x=>x.id===id);if(t) t.artist=ar.name;});saveMeta();renderArtistDetail();notify(pickerSelected.length+' titre(s) ajouté(s) ✓');}}
  else if(pickerType==='playlist'){var pl=playlists.find(p=>p.id===pickerTarget);if(pl){pickerSelected.forEach(id=>{if(!pl.trackIds.includes(id)) pl.trackIds.push(id);});saveMeta();renderPlDetail();notify(pickerSelected.length+' titre(s) ajouté(s) ✓');}}
  closeModal();
}

/* RENDER HOME */
function renderHome(){
  var hw=document.getElementById('hero-wrap');
  if(cur!==null&&tracks[cur]){var t=tracks[cur],h=t.hue||hue(t.name);hw.innerHTML=`<div class="hero" onclick="openPlayer()"><div style="position:absolute;inset:0;background:linear-gradient(135deg,${abg2(h)}ee,${abg(h)}99)"></div><div class="hero-inner"><p class="hero-tag">En lecture</p><p class="hero-name">${esc(t.name)}</p><p class="hero-artist">${esc(t.artist)}</p></div><button class="hero-play" onclick="event.stopPropagation();togglePlay()"><svg width="20" height="20" viewBox="0 0 24 24" fill="white">${isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>'}</svg></button></div>`;}
  else{hw.innerHTML=`<div class="hero" onclick="gotoNav('import')"><div style="position:absolute;inset:0;background:linear-gradient(135deg,#4DCFBF,#2a9d8f)"></div><div class="hero-inner"><p class="hero-tag">Bienvenue sur</p><p class="hero-name">Melo</p><p class="hero-artist">Importez votre musique pour commencer</p></div></div>`;}
  var ps=document.getElementById('playlists-section'),cr=document.getElementById('cards-row');
  if(playlists.length){ps.style.display='';cr.innerHTML=playlists.slice(0,8).map(pl=>{var colors=pl.trackIds.slice(0,4).map(id=>{var t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#2a3548';});var artHtml=colors.length>=2?`<div class="pl-card-grid">${colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('')}</div>`:`<div class="pl-card-solo">${noteIco(36,'rgba(255,255,255,.3)')}</div>`;return `<div class="pl-card" onclick="openPlDetail('${pl.id}')"><div class="pl-card-art" style="background:${colors[0]||'#2a3548'}">${artHtml}</div><p class="pl-card-name">${esc(pl.name)}</p><p class="pl-card-sub">${pl.trackIds.length} titre${pl.trackIds.length>1?'s':''}</p></div>`;}).join('')+`<div class="pl-new-card" onclick="newPlaylist()"><div class="pl-new-art"><svg width="28" height="28" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div><p class="pl-card-name" style="color:var(--sub);text-align:center">Nouvelle</p></div>`;}
  else ps.style.display='none';
  var sl=document.getElementById('song-list-overview'),lc=document.getElementById('lib-count-lbl');
  if(!tracks.length){lc.textContent='';sl.innerHTML=`<div class="empty-state"><div class="empty-icon">${noteIco(34,'var(--sub)')}</div><p class="empty-title">Bibliothèque vide</p><p class="empty-sub">Ajoutez vos fichiers audio</p><button class="empty-cta" onclick="gotoNav('import')">Importer</button></div>`;}
  else{lc.textContent=tracks.length+' titre'+(tracks.length>1?'s':'');sl.innerHTML=tracks.slice(0,6).map((t,i)=>songRowHtml(t,i,`rowClick(event,${i})`,`openTrackMenu(event,'${t.id}')`,null)).join('');if(tracks.length>6) sl.innerHTML+=`<div style="text-align:center;padding:12px"><button style="background:transparent;border:none;color:var(--acc);font-size:13px;font-weight:500" onclick="switchHomeTab('tracks')">Voir tout (${tracks.length})</button></div>`;}
}

function renderTracks(){var q=(document.getElementById('track-search')?.value||'').toLowerCase().trim();var list=q?tracks.filter(t=>(t.name+t.artist).toLowerCase().includes(q)):tracks;var el=document.getElementById('song-list-tracks'),lc=document.getElementById('tracks-count');if(!tracks.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">${noteIco(34,'var(--sub)')}</div><p class="empty-title">Aucun titre</p></div>`;return;}lc.textContent=list.length+(q?' résultat'+(list.length>1?'s':''):' titre'+(list.length>1?'s':''));el.innerHTML=list.map(t=>{var i=tracks.indexOf(t);return songRowHtml(t,i,`rowClick(event,${i})`,`openTrackMenu(event,'${t.id}')`,null);}).join('');}

function renderAlbumsGrid(){var el=document.getElementById('albums-grid');el.innerHTML=albums.map(alb=>{var colors=alb.trackIds.slice(0,4).map(id=>{var t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#2a3548';});var artHtml=colors.length>=2?`<div class="album-art-grid">${colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('')}</div>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${colors[0]||'#2a3548'}">${noteIco(36,'rgba(255,255,255,.4)')}</div>`;return `<div class="album-card" onclick="openAlbumDetail('${alb.id}')"><div class="album-art">${artHtml}<button class="album-menu-btn" onclick="event.stopPropagation();openAlbumMenu('${alb.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button></div><div class="album-info"><p class="album-name">${esc(alb.name)}</p><p class="album-sub">${alb.trackIds.length} titre${alb.trackIds.length>1?'s':''}</p></div></div>`;}).join('')+`<div class="album-new" onclick="newAlbum()"><svg width="28" height="28" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><p>Nouvel album</p></div>`;}

function openAlbumMenu(id){var alb=albums.find(a=>a.id===id);if(!alb) return;showModal(`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">${esc(alb.name)}</div><div class="sheet-item" onclick="closeModal();openAlbumDetail('${id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5z"/></svg>Ouvrir</div><div class="sheet-item" onclick="closeModal();renameAlbum('${id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Renommer</div><div class="sheet-item" onclick="closeModal();openTrackPicker('album','${id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Ajouter des titres</div><div class="sheet-item red" onclick="closeModal();deleteAlbum('${id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer</div></div>`);}

function openAlbumDetail(id){currentAlbum=albums.find(a=>a.id===id);if(!currentAlbum) return;document.getElementById('albd-title').textContent=currentAlbum.name;document.getElementById('albd-back').onclick=()=>{showScreen('home',true);switchHomeTab('albums');};renderAlbumDetail();showScreen('albumdetail');}
function renderAlbumDetail(){var el=document.getElementById('albd-scroll');if(!currentAlbum){el.innerHTML='';return;}var albTracks=currentAlbum.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);var colors=currentAlbum.trackIds.slice(0,4).map(id=>{var t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#2a3548';});var artHtml=colors.length>=2?colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join(''):'';el.innerHTML=`<div class="albd-hero"><div class="albd-art${colors.length<2?' solo':''}">${colors.length>=2?artHtml:noteIco(32,'var(--sub)')}</div><div class="albd-info"><p class="albd-name">${esc(currentAlbum.name)}</p><p class="albd-sub">${albTracks.length} titre${albTracks.length>1?'s':''}</p><button class="albd-play-btn" onclick="playAlbum('${currentAlbum.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>Lancer</button></div></div>`+(albTracks.length?`<div class="song-list">`+albTracks.map(t=>{var ri=tracks.indexOf(t);return songRowHtml(t,ri,`playFromAlbum('${currentAlbum.id}','${t.id}')`,null,`removeFromAlbum(event,'${currentAlbum.id}','${t.id}')`);}).join('')+'</div>':`<p style="text-align:center;color:var(--sub);font-size:14px;padding:30px">Album vide — appuyez sur ⋮ pour ajouter des titres</p>`);}
function editCurrentAlbum(){if(!currentAlbum) return;showModal(`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">${esc(currentAlbum.name)}</div><div class="sheet-item" onclick="closeModal();renameAlbum('${currentAlbum.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Renommer l'album</div><div class="sheet-item" onclick="closeModal();openTrackPicker('album','${currentAlbum.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Ajouter des titres</div><div class="sheet-item red" onclick="closeModal();deleteAlbum('${currentAlbum.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer l'album</div></div>`);}
function newAlbum(){showDialog('Nouvel album','Nom de l\'album...',name=>{if(!name.trim()) return;albums.push({id:genId(),name:name.trim(),trackIds:[]});saveMeta();renderAlbumsGrid();notify('Album créé ✓');});}
function renameAlbum(id){var alb=albums.find(a=>a.id===id);if(!alb) return;showDialog('Renommer',alb.name,name=>{if(!name.trim()) return;alb.name=name.trim();if(currentAlbum&&currentAlbum.id===id) document.getElementById('albd-title').textContent=alb.name;saveMeta();renderAlbumsGrid();notify('Renommé ✓');});}
async function deleteAlbum(id){albums=albums.filter(a=>a.id!==id);if(currentAlbum&&currentAlbum.id===id){currentAlbum=null;showScreen('home',true);switchHomeTab('albums');}await saveMeta();renderAlbumsGrid();notify('Album supprimé');}
async function removeFromAlbum(e,albId,tid){e.stopPropagation();var alb=albums.find(a=>a.id===albId);if(!alb) return;alb.trackIds=alb.trackIds.filter(x=>x!==tid);await saveMeta();renderAlbumDetail();notify('Retiré ✓');}
function playAlbum(id){var alb=albums.find(a=>a.id===id);if(!alb||!alb.trackIds.length) return;queueIds=alb.trackIds;var fi=tracks.findIndex(t=>t.id===alb.trackIds[0]);if(fi>-1) playAt(fi);}
function playFromAlbum(albId,tid){var alb=albums.find(a=>a.id===albId);if(!alb) return;queueIds=alb.trackIds;var idx=tracks.findIndex(t=>t.id===tid);if(idx>-1) playAt(idx);}

/* ARTISTS */
function renderArtists(){var el=document.getElementById('artists-list');if(!artists.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon"><svg width="34" height="34" viewBox="0 0 24 24" fill="var(--sub)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><p class="empty-title">Aucun artiste</p><p class="empty-sub">Créez votre premier artiste</p><button class="empty-cta" onclick="newArtist()">Créer un artiste</button></div>`;return;}el.innerHTML=artists.map(ar=>{var h=ar.hue||hue(ar.name);return `<div class="artist-card"><div class="artist-avatar" style="background:${abg2(h)}" onclick="openArtistDetail('${ar.id}')">${ar.name.slice(0,2).toUpperCase()}</div><div class="artist-info" onclick="openArtistDetail('${ar.id}')"><p class="artist-name">${esc(ar.name)}</p><p class="artist-sub">${ar.trackIds.length} titre${ar.trackIds.length>1?'s':''} · ${ar.albumIds.length} album${ar.albumIds.length>1?'s':''}</p></div><div><button class="artist-btn" onclick="openArtistMenu(event,'${ar.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button></div></div>`;}).join('');}

function openArtistDetail(id){currentArtist=artists.find(a=>a.id===id);if(!currentArtist) return;document.getElementById('artd-title').textContent=currentArtist.name;document.getElementById('artd-back').onclick=()=>{showScreen('artists',true);renderArtists();};renderArtistDetail();showScreen('artistdetail');}
function renderArtistDetail(){var el=document.getElementById('artd-scroll');if(!currentArtist){el.innerHTML='';return;}var h=currentArtist.hue||hue(currentArtist.name);var artTracks=currentArtist.trackIds.map(id=>tracks.find(t=>t.id===id)).filter(Boolean);var artAlbums=currentArtist.albumIds.map(id=>albums.find(a=>a.id===id)).filter(Boolean);var albumsHtml=artAlbums.length?`<p class="artd-section">Albums</p><div class="albums-grid" style="padding:0 0 10px">`+artAlbums.map(alb=>{var colors=alb.trackIds.slice(0,4).map(id=>{var t=tracks.find(x=>x.id===id);return t?abg(t.hue||hue(t.name)):'#2a3548';});var aHtml=colors.length>=2?`<div class="album-art-grid">${colors.slice(0,4).map(c=>`<div style="background:${c}"></div>`).join('')}</div>`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${colors[0]||'#2a3548'}">${noteIco(36,'rgba(255,255,255,.4)')}</div>`;return `<div class="album-card" onclick="openAlbumDetail('${alb.id}')"><div class="album-art">${aHtml}</div><div class="album-info"><p class="album-name">${esc(alb.name)}</p></div></div>`;}).join('')+'</div>':'';var tracksHtml=artTracks.length?`<p class="artd-section">Titres</p><div class="song-list">`+artTracks.map(t=>{var ri=tracks.indexOf(t);return songRowHtml(t,ri,`rowClick(event,${ri})`,`openTrackMenu(event,'${t.id}')`,null);}).join('')+'</div>':'';el.innerHTML=`<div class="artd-hero"><div class="artd-avatar" style="background:${abg2(h)}">${currentArtist.name.slice(0,2).toUpperCase()}</div><p class="artd-name">${esc(currentArtist.name)}</p><p class="artd-sub">${artTracks.length} titre${artTracks.length>1?'s':''} · ${artAlbums.length} album${artAlbums.length>1?'s':''}</p></div>${albumsHtml}${tracksHtml}`+(!artTracks.length&&!artAlbums.length?'<p style="text-align:center;color:var(--sub);font-size:14px;padding:30px">Aucun contenu — appuyez sur ⋮ pour ajouter</p>':'');}

function editCurrentArtist(){if(!currentArtist) return;showModal(`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">${esc(currentArtist.name)}</div><div class="sheet-item" onclick="closeModal();renameArtist('${currentArtist.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Renommer l'artiste</div><div class="sheet-item" onclick="closeModal();openTrackPicker('artist','${currentArtist.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Ajouter des titres</div><div class="sheet-item" onclick="closeModal();openAlbumPicker('${currentArtist.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>Ajouter des albums</div><div class="sheet-item red" onclick="closeModal();deleteArtist('${currentArtist.id}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer l'artiste</div></div>`);}

function newArtist(){showDialog('Nouvel artiste','Nom de l\'artiste...',name=>{if(!name.trim()) return;artists.push({id:genId(),name:name.trim(),hue:hue(name),trackIds:[],albumIds:[]});saveMeta();renderArtists();notify('Artiste créé ✓');});}

function newPlaylist(){showDialog('Nouvelle playlist','Nom...',name=>{if(!name.trim()) return;playlists.push({id:genId(),name:name.trim(),trackIds:[]});saveMeta();renderPlScreen();renderHome();notify('Playlist créée ✓');});}
function newPlaylistWithTrack(tid){showDialog('Nouvelle playlist','Nom...',name=>{if(!name.trim()) return;var pl={id:genId(),name:name.trim(),trackIds:[tid]};playlists.push(pl);saveMeta();renderHome();notify('Ajouté ✓');});}
function renamePl(id){var pl=playlists.find(p=>p.id===id);if(!pl) return;showDialog('Renommer',pl.name,name=>{if(!name.trim()) return;pl.name=name.trim();if(currentPl&&currentPl.id===id) document.getElementById('pld-title').textContent=pl.name;saveMeta();renderPlScreen();renderHome();notify('Renommée ✓');});}
async function deletePl(id){playlists=playlists.filter(p=>p.id!==id);if(currentPl&&currentPl.id===id){currentPl=null;queueIds=null;}await saveMeta();renderPlScreen();renderHome();notify('Playlist supprimée');}
function addToPlaylist(tid,plId){var pl=playlists.find(p=>p.id===plId);if(!pl) return;if(pl.trackIds.indexOf(tid)>-1){notify('Déjà dans cette playlist');return;}pl.trackIds.push(tid);saveMeta();notify('Ajouté ✓');}
async function removeFromPl(e,plId,tid){e.stopPropagation();var pl=playlists.find(p=>p.id===plId);if(!pl) return;pl.trackIds=pl.trackIds.filter(x=>x!==tid);await saveMeta();renderPlDetail();notify('Retiré ✓');}

/* TRACK MENU */
function rowClick(e,idx){if(!e.target.closest('.song-menu')) playAt(idx);}
function openTrackMenu(e,trackId){e.stopPropagation();var t=tracks.find(x=>x.id===trackId);if(!t) return;var plItems=playlists.map(pl=>`<div class="sheet-item" onclick="addToPlaylist('${trackId}','${pl.id}');closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>${esc(pl.name)}</div>`).join('');showModal(`<div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">${esc(t.name)}</div>${plItems}<div class="sheet-item" onclick="closeModal();newPlaylistWithTrack('${trackId}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nouvelle playlist...</div>${isCached(trackId)?`<div class="sheet-item" onclick="uncacheTrack('${trackId}');closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="var(--sub)"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Retirer du cache</div>`:''}<div class="sheet-item red" onclick="deleteTrack('${trackId}');closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="#ff4d4d"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Supprimer</div></div>`);}
async function deleteTrack(id){var t=tracks.find(x=>x.id===id);if(!t) return;var ti=tracks.indexOf(t);try{await fetch(API+'?action=delete&key='+encodeURIComponent(t.key)+'&fileId='+encodeURIComponent(t.fileId||''));}catch(_){}tracks=tracks.filter(x=>x.id!==id);playlists.forEach(pl=>{pl.trackIds=pl.trackIds.filter(x=>x!==id);});albums.forEach(alb=>{alb.trackIds=alb.trackIds.filter(x=>x!==id);});artists.forEach(ar=>{ar.trackIds=ar.trackIds.filter(x=>x!==id);});uncacheTrack(id);await saveMeta();if(cur===ti){cur=null;isPlaying=false;aud.pause();aud.src='';updateMiniPlayer();}else if(cur!==null&&ti<cur) cur--;renderHome();notify('Supprimé ✓');}

/* ═══════════════════════════════
   FIX 4: UP NEXT QUEUE with touch drag-to-reorder
   ═══════════════════════════════ */
function getQ(){return queueIds?tracks.filter(t=>queueIds.indexOf(t.id)>-1):tracks;}

function openUpNext(){
  if(cur===null) return;
  var q=getQ();
  var ci=q.findIndex(t=>tracks.indexOf(t)===cur);
  var upcoming=ci>=0?q.slice(ci+1):[];
  qDragItems=upcoming.map(t=>t.id).filter(id=>tracks.find(x=>x.id===id));
  showQueueModal();
}

function showQueueModal(){
  var curTrack=cur!==null?tracks[cur]:null;
  var nowHtml=curTrack?`<div style="padding:0 18px 10px;border-bottom:1px solid var(--border);margin-bottom:8px"><p style="font-size:10px;font-weight:700;color:var(--acc);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">En cours</p><div style="display:flex;align-items:center;gap:11px;padding:6px 0"><div style="width:42px;height:42px;border-radius:10px;background:${abg(curTrack.hue||hue(curTrack.name))};flex-shrink:0;display:flex;align-items:center;justify-content:center">${noteIco(18,'rgba(255,255,255,.8)')}</div><div><p style="font-size:14px;font-weight:600;color:var(--acc)">${esc(curTrack.name)}</p><p style="font-size:12px;color:var(--sub)">${esc(curTrack.artist)}</p></div></div></div>`:'';

  var listHtml=qDragItems.length?qDragItems.map((id,i)=>{var t=tracks.find(x=>x.id===id);if(!t) return '';var h=t.hue||hue(t.name);return `<div class="queue-row" data-idx="${i}" data-id="${id}"><div class="queue-art" style="background:${abg(h)}">${noteIco(16,'rgba(255,255,255,.8)')}</div><div class="queue-info"><p class="queue-name">${esc(t.name)}</p><p class="queue-artist">${esc(t.artist)}</p></div><button class="queue-play-btn" onclick="playQueueItem('${id}')"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button><div class="drag-handle"><svg width="22" height="22" viewBox="0 0 24 24" fill="var(--sub)"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></div></div>`;}).join(''):`<p style="text-align:center;color:var(--sub);font-size:14px;padding:30px 20px">Aucune chanson à venir.<br>Vous pouvez continuer en mode aléatoire.</p>`;

  showModal(`<div class="sheet"><div class="sheet-handle"></div><div style="display:flex;align-items:center;justify-content:space-between;padding:0 18px 8px"><p style="font-size:17px;font-weight:700;color:var(--text)">À suivre</p><p style="font-size:12px;color:var(--sub)">${qDragItems.length} titre${qDragItems.length>1?'s':''}</p></div>${nowHtml}<div class="queue-list" id="queue-list">${listHtml}</div></div>`);
  if(qDragItems.length) setTimeout(initQueueDrag,80);
}

function playQueueItem(id){
  var idx=tracks.findIndex(t=>t.id===id);
  if(idx>-1){
    /* Move this track to be next in queue */
    var newIds=qDragItems.filter(x=>x!==id);
    newIds.unshift(id);
    qDragItems=newIds;
    applyQueueReorder();
    closeModal();
    playAt(idx);
  }
}

function applyQueueReorder(){
  var q=getQ();
  var ci=q.findIndex(t=>tracks.indexOf(t)===cur);
  var beforeIds=ci>=0?q.slice(0,ci+1).map(t=>t.id):[];
  if(!queueIds){
    /* Was using all tracks — now create explicit queueIds */
    queueIds=[...beforeIds,...qDragItems];
  } else {
    var kept=queueIds.filter(id=>beforeIds.includes(id));
    queueIds=[...kept,...qDragItems];
  }
}

function initQueueDrag(){
  var list=document.getElementById('queue-list');
  if(!list) return;
  var rows=Array.from(list.querySelectorAll('.queue-row'));
  if(!rows.length) return;
  var itemH=rows[0].offsetHeight+4;

  rows.forEach((row,idx)=>{
    var handle=row.querySelector('.drag-handle');
    if(!handle) return;
    handle.addEventListener('touchstart',function(e){
      e.preventDefault();
      var state={active:true,startIdx:idx,curIdx:idx,startY:e.touches[0].clientY,el:row,ghost:null};
      var rect=row.getBoundingClientRect();
      state.ghost=row.cloneNode(true);
      Object.assign(state.ghost.style,{position:'fixed',left:rect.left+'px',top:rect.top+'px',width:rect.width+'px',zIndex:1000,background:'var(--card2)',borderRadius:'14px',pointerEvents:'none',boxShadow:'0 12px 32px rgba(0,0,0,.5)',opacity:'0.96'});
      document.body.appendChild(state.ghost);
      row.classList.add('dragging-src');

      function onMove(e){
        if(!state.active) return; e.preventDefault();
        var dy=e.touches[0].clientY-state.startY;
        state.ghost.style.transform='translateY('+dy+'px)';
        var ni=Math.max(0,Math.min(rows.length-1,state.startIdx+Math.round(dy/itemH)));
        if(ni!==state.curIdx){state.curIdx=ni;rows.forEach((r,i)=>{r.style.transform='';if(r===state.el) return;if(state.startIdx<state.curIdx&&i>state.startIdx&&i<=state.curIdx) r.style.transform='translateY(-'+itemH+'px)';else if(state.startIdx>state.curIdx&&i>=state.curIdx&&i<state.startIdx) r.style.transform='translateY('+itemH+'px)';});}
      }
      function onEnd(){
        document.removeEventListener('touchmove',onMove);
        state.active=false;
        row.classList.remove('dragging-src');
        if(state.ghost){state.ghost.remove();state.ghost=null;}
        rows.forEach(r=>r.style.transform='');
        if(state.startIdx!==state.curIdx){
          var moved=qDragItems.splice(state.startIdx,1)[0];
          qDragItems.splice(state.curIdx,0,moved);
          applyQueueReorder();
          showQueueModal(); /* re-render with new order */
        }
      }
      document.addEventListener('touchmove',onMove,{passive:false});
      document.addEventListener('touchend',onEnd,{once:true});
    },{passive:false});
  });
}

/* PLAYBACK */
function playAt(idx){var t=tracks[idx];if(!t||!dlToken) return;cur=idx;aud.src=isCached(t.id)?blobCache.get(t.id):rawUrl(t.key);aud.load();aud.play().catch(e=>console.error(e));if(!isCached(t.id)) scheduleCacheDl(t);renderHome();renderPlDetail();renderAlbumDetail();renderArtistDetail();updateMiniPlayer();updatePlayerScreen();}
function togglePlay(){if(cur===null) return;if(isPlaying){aud.pause();isPlaying=false;}else{aud.play().catch(()=>{});isPlaying=true;}updatePlayBtns();renderHome();renderPlDetail();}
function getNextIdx(){var q=getQ();if(!q.length) return null;if(isShuffle){var i;do{i=Math.floor(Math.random()*q.length);}while(q.length>1&&tracks.indexOf(q[i])===cur);return tracks.indexOf(q[i]);}var ci=q.findIndex(t=>tracks.indexOf(t)===cur);return tracks.indexOf(q[(ci+1)%q.length]);}
function getPrevIdx(){var q=getQ();if(!q.length) return null;var ci=q.findIndex(t=>tracks.indexOf(t)===cur);return tracks.indexOf(q[(ci-1+q.length)%q.length]);}
function goNext(){if(repeatMode===2){aud.currentTime=0;aud.play();return;}var i=getNextIdx();if(i!==null) playAt(i);}
function goPrev(){if(aud.currentTime>3){aud.currentTime=0;return;}var i=getPrevIdx();if(i!==null) playAt(i);}
function toggleShuffle(){isShuffle=!isShuffle;document.getElementById('pc-shuf').classList.toggle('on',isShuffle);}
function toggleRepeat(){repeatMode=(repeatMode+1)%3;document.getElementById('pc-rep').classList.toggle('on',repeatMode>0);document.getElementById('pc-repdot').style.display=repeatMode>0?'block':'none';document.getElementById('pc-repico').innerHTML=repeatMode===2?'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>':'<path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>';}
function setVol(v){volume=parseFloat(v);aud.volume=volume;}
function toggleLike(){var t=tracks[cur];if(!t) return;if(liked.has(t.id)){liked.delete(t.id);document.querySelector('#like-btn svg').style.fill='var(--sub)';}else{liked.add(t.id);document.querySelector('#like-btn svg').style.fill='#ff4d4d';}}

function updatePlayBtns(){var p=isPlaying?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z';document.getElementById('pc-ico').innerHTML=`<path d="${p}"/>`;document.getElementById('mp-ico').innerHTML=`<path d="${p}"/>`;}
function updateMiniPlayer(){var mp=document.getElementById('mini-player');if(cur===null){mp.classList.remove('show');return;}var t=tracks[cur],h=t.hue||hue(t.name);mp.classList.add('show');document.getElementById('mp-art').style.background=abg(h);document.getElementById('mp-art').innerHTML=noteIco(18,'rgba(255,255,255,.8)');document.getElementById('mp-name').textContent=t.name;document.getElementById('mp-artist').textContent=t.artist;updatePlayBtns();}
function updatePlayerScreen(){if(cur===null) return;var t=tracks[cur],h=t.hue||hue(t.name);var pa=document.getElementById('player-art');pa.style.background=`linear-gradient(135deg,${abg(h)},${abg2(h)})`;pa.innerHTML=noteIco(80,'rgba(255,255,255,.4)');pa.classList.remove('pulse');requestAnimationFrame(()=>pa.classList.add('pulse'));document.getElementById('player-title').textContent=t.name;document.getElementById('player-artist').textContent=t.artist;document.querySelector('#like-btn svg').style.fill=liked.has(t.id)?'#ff4d4d':'var(--sub)';updatePlayBtns();}

document.getElementById('seek-track').addEventListener('click',e=>{if(!aud.duration) return;var r=e.currentTarget.getBoundingClientRect();aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;});
aud.addEventListener('timeupdate',()=>{var p=aud.duration?(aud.currentTime/aud.duration)*100:0;document.getElementById('seek-fill').style.width=p+'%';document.getElementById('mp-prog-fill').style.width=p+'%';document.getElementById('p-pt').textContent=fmt(aud.currentTime);document.getElementById('p-dt').textContent=fmt(aud.duration);});
aud.addEventListener('play',()=>{isPlaying=true;updatePlayBtns();renderHome();renderPlDetail();});
aud.addEventListener('pause',()=>{isPlaying=false;updatePlayBtns();renderHome();renderPlDetail();});
aud.addEventListener('ended',goNext);

var modalEl=null;
function showModal(html){closeModal();modalEl=document.createElement('div');modalEl.className='modal-bg';modalEl.innerHTML=html;modalEl.addEventListener('click',e=>{if(e.target===modalEl)closeModal();});document.body.appendChild(modalEl);}
function closeModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function showDialog(title,placeholder,onConfirm){showModal(`<div class="modal-bg center" style="position:static;display:flex;align-items:center;justify-content:center;width:100%"><div class="sheet dialog"><p class="dialog-title">${esc(title)}</p><input class="dialog-input" id="dia-in" placeholder="${esc(placeholder)}"><div class="dialog-btns"><button class="d-btn cancel" onclick="closeModal()">Annuler</button><button class="d-btn confirm" id="dia-ok">Créer</button></div></div></div>`);var inp=document.getElementById('dia-in'),btn=document.getElementById('dia-ok');if(inp) setTimeout(()=>inp.focus(),60);if(btn) btn.onclick=()=>{onConfirm(inp?inp.value:'');closeModal();};if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter'){onConfirm(inp.value);closeModal();}});}

var dz=document.getElementById('dz');
dz.addEventListener('click',()=>document.getElementById('filein').click());
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFiles(e.dataTransfer.files);});
document.getElementById('filein').addEventListener('change',e=>handleFiles(e.target.files));
function handleFiles(files){var af=Array.from(files).filter(f=>f.type.startsWith('audio/')||/\.(mp3|wav|ogg|flac|aac|m4a|opus)$/i.test(f.name));if(!af.length){notify('Aucun fichier audio détecté');return;}af.forEach(uploadFile);}

async function uploadFile(file){var id=genId(),ext=(file.name.match(/\.[^.]+$/)||['.mp3'])[0].toLowerCase();var key='tracks/'+id+ext,name=file.name.replace(/\.[^.]+$/,'').replace(/[_\-]+/g,' ').trim();var ul=document.getElementById('uplist'),item=document.createElement('div');item.className='upitem';item.innerHTML=`<div class="uphd"><span class="upname">${esc(name)}</span><span class="uppct" id="pct-${id}">0%</span></div><div class="upbg"><div class="upfill" id="bar-${id}" style="width:0%"></div></div>`;ul.prepend(item);var setP=p=>{var pe=document.getElementById('pct-'+id),be=document.getElementById('bar-'+id);if(pe)pe.textContent=p+'%';if(be)be.style.width=p+'%';};
try{var cr=await fetch(API+'?action=upload-creds');if(!cr.ok) throw new Error('Credentials indisponibles');var creds=await cr.json();var buf=await file.arrayBuffer();var hash=await crypto.subtle.digest('SHA-1',buf);var sha1=Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
var fileId=await new Promise((resolve,reject)=>{var xhr=new XMLHttpRequest();xhr.open('POST',creds.uploadUrl);xhr.setRequestHeader('Authorization',creds.authorizationToken);xhr.setRequestHeader('X-Bz-File-Name',encodeURIComponent(key));xhr.setRequestHeader('Content-Type',file.type||'audio/mpeg');xhr.setRequestHeader('X-Bz-Content-Sha1',sha1);xhr.upload.onprogress=e=>{if(e.lengthComputable)setP(Math.round(e.loaded/e.total*100));};xhr.onload=()=>{try{var r=JSON.parse(xhr.responseText);if(xhr.status>=200&&xhr.status<300)resolve(r.fileId);else reject(new Error('B2 '+xhr.status+': '+(r.message||'')));}catch(e){reject(new Error('Réponse invalide'));}};xhr.onerror=()=>reject(new Error('Erreur réseau'));xhr.send(new Blob([buf]));});
item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="updone">✓ Uploadé</span>`;item.querySelector('.upbg').style.display='none';tracks.push({id,key,name,artist:'Artiste inconnu',hue:hue(name),fileId});await saveMeta();renderHome();notify('✓ '+name+' ajouté');}
catch(err){item.querySelector('.uphd').innerHTML=`<span class="upname">${esc(name)}</span><span class="uperr">✗ ${esc(err.message)}</span>`;item.querySelector('.upbg').style.display='none';notify('Erreur: '+err.message.slice(0,50));}}

async function init(){try{var r=await fetch(API+'?action=init');if(!r.ok) throw new Error('Serveur indisponible ('+r.status+')');var d=await r.json();if(d.error) throw new Error(d.error);tracks=Array.isArray(d.tracks)?d.tracks:[];playlists=Array.isArray(d.playlists)?d.playlists:[];albums=Array.isArray(d.albums)?d.albums:[];artists=Array.isArray(d.artists)?d.artists:[];dlUrl=d.downloadUrl;dlToken=d.downloadToken;document.getElementById('loading').style.display='none';renderHome();}catch(e){document.getElementById('ldmsg').textContent='❌ '+e.message;document.getElementById('ldmsg').style.color='#ff4d4d';document.querySelector('.spin').style.display='none';}}
init();
</script>
